<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anki App — 單字管理</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<nav>
  <span class="logo">📚 Anki</span>
  <div class="nav-links">
    <a href="review.html">複習</a>
    <a href="manage.html" class="active">管理</a>
  </div>
  <div class="user-info">
    <img class="avatar" id="avatar" src="" style="display:none">
    <span class="user-name" id="userName"></span>
    <button class="btn btn-secondary btn-sm" id="logoutBtn">登出</button>
  </div>
</nav>

<div class="container">

  <!-- Add card -->
  <div class="card">
    <h3 style="margin-bottom:16px;font-size:1rem">新增單字</h3>
    <div class="add-form-grid">
      <div class="form-group">
        <label>單字 / 正面 *</label>
        <input id="inFront" placeholder="e.g. hello">
      </div>
      <div class="form-group">
        <label>意思 / 背面 *</label>
        <input id="inBack" placeholder="e.g. 你好">
      </div>
    </div>
    <div class="form-group">
      <label>例句</label>
      <input id="inSentence" placeholder="e.g. Hello, how are you?">
    </div>
    <div class="form-group">
      <label>標籤（用分號分隔）</label>
      <input id="inTags" placeholder="e.g. 日常;問候">
    </div>
    <div class="form-group">
      <label>牌組</label>
      <select id="inDeck"><option value="">— 選擇牌組 —</option></select>
    </div>
    <button class="btn btn-primary btn-full" id="addBtn">新增單字</button>
  </div>

  <!-- CSV Import -->
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">匯入 CSV</h3>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:12px">格式：front,back,sentence,tags,deck（tags 用分號分隔，deck 欄位自動建立牌組）</p>
    <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px">
    <button class="btn btn-secondary btn-full" id="importBtn">匯入</button>
    <div id="importProgress" style="display:none;margin-top:12px">
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:6px" id="importResult"></div>
      <div style="background:var(--surface2);border-radius:4px;height:8px;overflow:hidden">
        <div id="importBar" style="background:var(--accent);height:100%;width:0%;transition:width .2s"></div>
      </div>
    </div>
  </div>

  <!-- Deck list -->
  <div class="card">
    <div class="section-header" style="margin-bottom:12px">
      <h3 style="font-size:1rem">牌組管理</h3>
      <div style="display:flex;gap:8px">
        <input id="newDeckName" placeholder="新牌組名稱" style="width:auto;flex:1;padding:7px 12px;font-size:.85rem">
        <button class="btn btn-secondary btn-sm" id="addDeckBtn">新增</button>
      </div>
    </div>
    <div id="deckList"></div>
  </div>

  <!-- Card list -->
  <div>
    <div class="section-header">
      <h3>單字列表</h3>
      <span id="cardCount" style="font-size:.85rem;color:var(--muted)"></span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <select id="filterDeck" class="deck-select" style="flex:1;min-width:120px">
        <option value="">全部牌組</option>
      </select>
      <div class="search-bar" style="flex:2;min-width:160px;margin-bottom:0">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" placeholder="搜尋單字...">
      </div>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth } from "./firebase.js";
  import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { addCard, getCards, getDecks, deleteCard, deleteDeck, ensureDeck, importCSV } from "./db.js";

  let uid, cards = [], decks = [];

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = "index.html"; return; }
    uid = user.uid;
    document.getElementById("userName").textContent = user.displayName || user.email;
    if (user.photoURL) {
      const av = document.getElementById("avatar");
      av.src = user.photoURL; av.style.display = "block";
    }
    await refresh();
  });

  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

  // Add deck
  document.getElementById("addDeckBtn").addEventListener("click", async () => {
    const name = document.getElementById("newDeckName").value.trim();
    if (!name) { showToast("請輸入牌組名稱"); return; }
    await ensureDeck(uid, name);
    document.getElementById("newDeckName").value = "";
    showToast(`牌組「${name}」已建立`);
    await refresh();
  });

  async function refresh() {
    decks = await getDecks(uid);
    renderDeckSelects();
    const deckId = document.getElementById("filterDeck").value;
    cards = await getCards(uid, deckId || null);
    renderDecks();
    renderList(cards);
  }

  function renderDeckSelects() {
    const opts = decks.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
    document.getElementById("inDeck").innerHTML = '<option value="">— 選擇牌組 —</option>' + opts;
    const filterSel = document.getElementById("filterDeck");
    const current = filterSel.value;
    filterSel.innerHTML = opts + '<option value="">全部牌組</option>';
    filterSel.value = current || (decks[0]?.id ?? "");
  }

  function renderDecks() {
    const el = document.getElementById("deckList");
    if (!decks.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.85rem">尚無牌組</p>'; return; }
    el.innerHTML = decks.map(d => {
      const count = cards.filter(c => c.deckId === d.id).length;
      return `<div class="card-item">
        <div class="card-item-info">
          <div class="card-item-front">📂 ${d.name}</div>
          <div class="card-item-back">${count} 張單字</div>
        </div>
        <button class="btn btn-danger btn-sm" data-deck="${d.id}" style="flex-shrink:0">刪除</button>
      </div>`;
    }).join("");
    el.querySelectorAll("[data-deck]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const deck = decks.find(d => d.id === btn.dataset.deck);
        if (!confirm(`確定刪除牌組「${deck?.name}」及其所有單字？`)) return;
        await deleteDeck(uid, btn.dataset.deck);
        showToast("牌組已刪除");
        await refresh();
      });
    });
  }

  // Add card
  document.getElementById("addBtn").addEventListener("click", async () => {
    const front = document.getElementById("inFront").value.trim();
    const back = document.getElementById("inBack").value.trim();
    if (!front || !back) { showToast("請填寫單字和意思"); return; }
    const tags = document.getElementById("inTags").value.split(";").map(t => t.trim()).filter(Boolean);
    const sentence = document.getElementById("inSentence").value.trim();
    const deckId = document.getElementById("inDeck").value || null;
    await addCard(uid, { front, back, sentence, tags, deckId });
    showToast("已新增");
    ["inFront","inBack","inSentence","inTags"].forEach(id => document.getElementById(id).value = "");
    await refresh();
  });

  // CSV import
  document.getElementById("importBtn").addEventListener("click", async () => {
    const file = document.getElementById("csvFile").files[0];
    if (!file) { showToast("請選擇 CSV 檔案"); return; }
    const resultEl = document.getElementById("importResult");
    const progressEl = document.getElementById("importProgress");
    const barEl = document.getElementById("importBar");
    progressEl.style.display = "block";
    resultEl.textContent = "⏳ 解析中...";
    barEl.style.width = "0%";
    document.getElementById("importBtn").disabled = true;
    const text = await file.text();
    const count = await importCSV(uid, text, (done, total) => {
      const pct = Math.round((done / total) * 100);
      resultEl.textContent = `⏳ 匯入中 ${done} / ${total} (${pct}%)`;
      barEl.style.width = pct + "%";
    });
    resultEl.textContent = `✅ 成功匯入 ${count} 筆`;
    barEl.style.width = "100%";
    document.getElementById("importBtn").disabled = false;
    await refresh();
  });

  // Filter + Search
  function getFiltered() {
    const deckId = document.getElementById("filterDeck").value;
    const q = document.getElementById("searchInput").value.toLowerCase();
    return cards.filter(c =>
      (!deckId || c.deckId === deckId) &&
      (!q || c.front.toLowerCase().includes(q) || (c.back||"").toLowerCase().includes(q))
    );
  }

  document.getElementById("filterDeck").addEventListener("change", async () => {
    const deckId = document.getElementById("filterDeck").value;
    cards = await getCards(uid, deckId || null);
    renderList(getFiltered());
  });
  document.getElementById("searchInput").addEventListener("input", () => renderList(getFiltered()));

  function renderList(list) {
    const container = document.getElementById("cardList");
    document.getElementById("cardCount").textContent = `${list.length} 筆`;
    container.innerHTML = list.map(c => {
      const deckName = decks.find(d => d.id === c.deckId)?.name || "";
      return `<div class="card-item">
        <div class="card-item-info">
          <div class="card-item-front">${c.front}${deckName ? ` <span class="tag" style="font-size:.7rem;opacity:.7">${deckName}</span>` : ""}</div>
          <div class="card-item-back">${c.back || ""}</div>
          ${c.sentence ? `<div class="card-item-sentence">${c.sentence}</div>` : ""}
          ${(c.tags||[]).length ? `<div class="tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>` : ""}
        </div>
        <button class="btn btn-danger btn-sm" data-id="${c.id}" style="flex-shrink:0">刪除</button>
      </div>`;
    }).join("");

    container.querySelectorAll("[data-id]").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("確定刪除？")) return;
        await deleteCard(uid, btn.dataset.id);
        showToast("已刪除");
        await refresh();
      });
    });
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }
</script>
</body>
</html>
