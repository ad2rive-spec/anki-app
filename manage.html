<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anki App — 單字管理</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<nav>
  <span class="logo">📚 Anki</span>
  <div class="nav-links">
    <a href="review.html">複習</a>
    <a href="manage.html" class="active">管理</a>
  </div>
  <div class="user-info">
    <img class="avatar" id="avatar" src="" style="display:none">
    <span class="user-name" id="userName"></span>
    <button class="btn btn-secondary btn-sm" id="logoutBtn">登出</button>
  </div>
</nav>

<div class="container">

  <!-- Accordion: 新增單字 -->
  <div class="accordion-header" id="acc1" onclick="toggleAccordion('acc1','body1')">
    <h3>＋ 新增單字</h3>
    <svg class="accordion-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="accordion-body" id="body1">
    <div class="accordion-body-inner card" style="margin-bottom:4px">
      <div class="add-form-grid">
        <div class="form-group">
          <label>單字 / 正面 *</label>
          <input id="inFront" placeholder="e.g. hello">
        </div>
        <div class="form-group">
          <label>意思 / 背面 *</label>
          <input id="inBack" placeholder="e.g. 你好">
        </div>
      </div>
      <div class="form-group">
        <label>例句</label>
        <input id="inSentence" placeholder="e.g. Hello, how are you?">
      </div>
      <div class="form-group">
        <label>標籤（用分號分隔）</label>
        <input id="inTags" placeholder="e.g. 日常;問候">
      </div>
      <div class="form-group">
        <label>牌組</label>
        <select id="inDeck"><option value="">— 選擇牌組 —</option></select>
      </div>
      <button class="btn btn-primary btn-full" id="addBtn">新增單字</button>
    </div>
  </div>

  <!-- Accordion: 匯入 CSV -->
  <div class="accordion-header" id="acc2" onclick="toggleAccordion('acc2','body2')">
    <h3>📥 匯入 CSV</h3>
    <svg class="accordion-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="accordion-body" id="body2">
    <div class="accordion-body-inner card" style="margin-bottom:4px">
      <p style="font-size:.8rem;color:var(--muted);margin-bottom:12px">格式：front,back,sentence,tags,deck（tags 用分號分隔，deck 欄位自動建立牌組）</p>
      <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px">
      <button class="btn btn-secondary btn-full" id="importBtn">匯入</button>
      <div id="importProgress" style="display:none;margin-top:12px">
        <div style="font-size:.85rem;color:var(--muted);margin-bottom:6px" id="importResult"></div>
        <div style="background:var(--surface2);border-radius:4px;height:8px;overflow:hidden">
          <div id="importBar" style="background:var(--accent);height:100%;width:0%;transition:width .2s"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Accordion: 牌組管理 -->
  <div class="accordion-header open" id="acc3" onclick="toggleAccordion('acc3','body3')">
    <h3>📂 牌組管理</h3>
    <svg class="accordion-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="accordion-body open" id="body3">
    <div class="accordion-body-inner card" style="margin-bottom:4px">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="newDeckName" placeholder="新牌組名稱" style="flex:1;padding:7px 12px;font-size:.85rem">
        <button class="btn btn-secondary btn-sm" id="addDeckBtn">新增</button>
      </div>
      <div id="deckList">
        <!-- skeleton -->
        <div class="skeleton" style="height:52px;border-radius:12px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:52px;border-radius:12px"></div>
      </div>
    </div>
  </div>

  <!-- 單字列表 -->
  <div style="margin-top:8px">
    <div class="section-header">
      <h3>單字列表</h3>
      <span id="cardCount" style="font-size:.85rem;color:var(--muted)"></span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <select id="filterDeck" class="deck-select" style="flex:1;min-width:120px">
        <option value="">全部牌組</option>
      </select>
      <div class="search-bar" style="flex:2;min-width:160px;margin-bottom:0">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" placeholder="搜尋單字...">
      </div>
    </div>
    <!-- 虛擬捲動容器 -->
    <div id="cardListContainer" style="position:relative;overflow-y:auto;max-height:60vh">
      <div id="cardListSpacer" style="position:relative">
        <div class="card-list" id="cardList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth } from "./firebase.js";
  import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { addCard, getCards, getDecks, deleteCard, deleteDeck, ensureDeck, importCSV } from "./db.js";

  let uid, cards = [], decks = [];
  const PAGE_SIZE = 50; // 虛擬捲動每次渲染筆數
  let renderOffset = 0;

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = "index.html"; return; }
    uid = user.uid;
    document.getElementById("userName").textContent = user.displayName || user.email;
    if (user.photoURL) {
      const av = document.getElementById("avatar");
      av.src = user.photoURL; av.style.display = "block";
    }
    await refresh();
  });

  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

  // Accordion
  window.toggleAccordion = (headerId, bodyId) => {
    const header = document.getElementById(headerId);
    const body = document.getElementById(bodyId);
    header.classList.toggle("open");
    body.classList.toggle("open");
  };

  // Add deck
  document.getElementById("addDeckBtn").addEventListener("click", async () => {
    const name = document.getElementById("newDeckName").value.trim();
    if (!name) { showToast("請輸入牌組名稱"); return; }
    await ensureDeck(uid, name);
    document.getElementById("newDeckName").value = "";
    showToast(`牌組「${name}」已建立`);
    await refresh();
  });

  async function refresh() {
    decks = await getDecks(uid);
    renderDeckSelects();
    const deckId = document.getElementById("filterDeck").value;
    cards = await getCards(uid, deckId || null);
    renderDecks();
    renderOffset = 0;
    renderList(getFiltered());
  }

  function renderDeckSelects() {
    const opts = decks.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
    document.getElementById("inDeck").innerHTML = '<option value="">— 選擇牌組 —</option>' + opts;
    const filterSel = document.getElementById("filterDeck");
    const current = filterSel.value;
    filterSel.innerHTML = opts + '<option value="">全部牌組</option>';
    filterSel.value = current || (decks[0]?.id ?? "");
  }

  function renderDecks() {
    const el = document.getElementById("deckList");
    if (!decks.length) {
      el.innerHTML = '<div class="empty-state" style="padding:24px 0"><div class="icon">📭</div><p>尚無牌組，請新增或匯入 CSV</p></div>';
      return;
    }
    el.innerHTML = decks.map(d => `
      <div class="card-item" id="deck-${d.id}">
        <div class="card-item-info">
          <div class="card-item-front">📂 ${d.name}</div>
        </div>
        <button class="btn btn-danger btn-sm" data-deck="${d.id}">刪除</button>
        <div class="delete-confirm" id="dconf-${d.id}">
          <span>確定刪除整個牌組？</span>
          <button class="btn btn-danger btn-sm" data-confirm-deck="${d.id}">確定</button>
          <button class="btn btn-secondary btn-sm" data-cancel-deck="${d.id}">取消</button>
        </div>
      </div>`).join("");

    el.querySelectorAll("[data-deck]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById(`dconf-${btn.dataset.deck}`).classList.add("show");
      });
    });
    el.querySelectorAll("[data-confirm-deck]").forEach(btn => {
      btn.addEventListener("click", async () => {
        await deleteDeck(uid, btn.dataset.confirmDeck);
        showToast("牌組已刪除");
        await refresh();
      });
    });
    el.querySelectorAll("[data-cancel-deck]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById(`dconf-${btn.dataset.cancelDeck}`).classList.remove("show");
      });
    });
  }

  // Add card
  document.getElementById("addBtn").addEventListener("click", async () => {
    const front = document.getElementById("inFront").value.trim();
    const back = document.getElementById("inBack").value.trim();
    if (!front || !back) { showToast("請填寫單字和意思"); return; }
    const tags = document.getElementById("inTags").value.split(";").map(t => t.trim()).filter(Boolean);
    const sentence = document.getElementById("inSentence").value.trim();
    const deckId = document.getElementById("inDeck").value || null;
    await addCard(uid, { front, back, sentence, tags, deckId });
    showToast("已新增");
    ["inFront","inBack","inSentence","inTags"].forEach(id => document.getElementById(id).value = "");
    await refresh();
  });

  // CSV import
  document.getElementById("importBtn").addEventListener("click", async () => {
    const file = document.getElementById("csvFile").files[0];
    if (!file) { showToast("請選擇 CSV 檔案"); return; }
    const resultEl = document.getElementById("importResult");
    const progressEl = document.getElementById("importProgress");
    const barEl = document.getElementById("importBar");
    progressEl.style.display = "block";
    resultEl.textContent = "⏳ 解析中...";
    barEl.style.width = "0%";
    document.getElementById("importBtn").disabled = true;
    const text = await file.text();
    const count = await importCSV(uid, text, (done, total) => {
      const pct = Math.round((done / total) * 100);
      resultEl.textContent = `⏳ 匯入中 ${done} / ${total} (${pct}%)`;
      barEl.style.width = pct + "%";
    });
    resultEl.textContent = `✅ 成功匯入 ${count} 筆`;
    barEl.style.width = "100%";
    document.getElementById("importBtn").disabled = false;
    await refresh();
  });

  // Filter + Search
  function getFiltered() {
    const deckId = document.getElementById("filterDeck").value;
    const q = document.getElementById("searchInput").value.toLowerCase();
    return cards.filter(c =>
      (!deckId || c.deckId === deckId) &&
      (!q || c.front.toLowerCase().includes(q) || (c.back||"").toLowerCase().includes(q))
    );
  }

  document.getElementById("filterDeck").addEventListener("change", async () => {
    const deckId = document.getElementById("filterDeck").value;
    cards = await getCards(uid, deckId || null);
    renderOffset = 0;
    renderList(getFiltered());
  });
  document.getElementById("searchInput").addEventListener("input", () => {
    renderOffset = 0;
    renderList(getFiltered());
  });

  // 虛擬捲動：捲到底部時載入更多
  document.getElementById("cardListContainer").addEventListener("scroll", e => {
    const el = e.target;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 100) {
      const filtered = getFiltered();
      if (renderOffset < filtered.length) {
        renderOffset += PAGE_SIZE;
        appendList(filtered);
      }
    }
  });

  function renderList(list) {
    const container = document.getElementById("cardList");
    document.getElementById("cardCount").textContent = `${list.length} 筆`;
    renderOffset = PAGE_SIZE;
    const slice = list.slice(0, renderOffset);

    if (!list.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>找不到符合的單字</p></div>';
      return;
    }
    container.innerHTML = slice.map(c => cardItemHtml(c)).join("");
    bindDeleteEvents(container);
  }

  function appendList(list) {
    const container = document.getElementById("cardList");
    const slice = list.slice(renderOffset - PAGE_SIZE, renderOffset);
    slice.forEach(c => {
      const div = document.createElement("div");
      div.innerHTML = cardItemHtml(c);
      const item = div.firstElementChild;
      container.appendChild(item);
      bindDeleteEvents(item);
    });
  }

  function cardItemHtml(c) {
    const deckName = decks.find(d => d.id === c.deckId)?.name || "";
    return `<div class="card-item" id="ci-${c.id}">
      <div class="card-item-info">
        <div class="card-item-front">${c.front}${deckName ? ` <span class="tag" style="font-size:.7rem;opacity:.7">${deckName}</span>` : ""}</div>
        <div class="card-item-back">${c.back || ""}</div>
        ${c.sentence ? `<div class="card-item-sentence">${c.sentence}</div>` : ""}
        ${(c.tags||[]).length ? `<div class="tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>` : ""}
      </div>
      <button class="btn btn-danger btn-sm" data-id="${c.id}" style="flex-shrink:0">刪除</button>
      <div class="delete-confirm" id="conf-${c.id}">
        <span>確定刪除？</span>
        <button class="btn btn-danger btn-sm" data-confirm="${c.id}">確定</button>
        <button class="btn btn-secondary btn-sm" data-cancel="${c.id}">取消</button>
      </div>
    </div>`;
  }

  function bindDeleteEvents(root) {
    root.querySelectorAll("[data-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById(`conf-${btn.dataset.id}`)?.classList.add("show");
      });
    });
    root.querySelectorAll("[data-confirm]").forEach(btn => {
      btn.addEventListener("click", async () => {
        await deleteCard(uid, btn.dataset.confirm);
        document.getElementById(`ci-${btn.dataset.confirm}`)?.remove();
        cards = cards.filter(c => c.id !== btn.dataset.confirm);
        document.getElementById("cardCount").textContent = `${getFiltered().length} 筆`;
        showToast("已刪除");
      });
    });
    root.querySelectorAll("[data-cancel]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById(`conf-${btn.dataset.cancel}`)?.classList.remove("show");
      });
    });
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }
</script>
</body>
</html>
