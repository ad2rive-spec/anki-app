<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anki App — 複習</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<nav>
  <span class="logo">📚 Anki</span>
  <div class="nav-links">
    <a href="review.html" class="active">複習</a>
    <a href="manage.html">管理</a>
  </div>
  <div class="user-info">
    <img class="avatar" id="avatar" src="" style="display:none">
    <span class="user-name" id="userName"></span>
    <button class="btn btn-secondary btn-sm" id="logoutBtn">登出</button>
  </div>
</nav>

<div class="container">
  <!-- Deck selector -->
  <div style="margin-bottom:12px">
    <select id="deckSelect" class="deck-select">
      <option value="">載入中...</option>
    </select>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="num" id="statDue">—</div><div class="label">待複習</div></div>
    <div class="stat"><div class="num" id="statDone">0</div><div class="label">今日完成</div></div>
    <div class="stat"><div class="num" id="statTotal">—</div><div class="label">總單字</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- Skeleton loading -->
  <div id="skeletonArea">
    <div class="skeleton-card">
      <div class="skeleton skeleton-line lg"></div>
      <div class="skeleton skeleton-line sm"></div>
    </div>
    <div style="text-align:center;margin-top:16px">
      <div class="skeleton" style="height:44px;width:140px;display:inline-block;border-radius:12px"></div>
    </div>
  </div>

  <!-- Review area -->
  <div id="reviewArea" style="display:none">
    <div class="card-scene">
      <div class="review-card" id="reviewCard">
        <!-- Front face -->
        <div class="card-face front" id="frontFace">
          <div class="review-front" id="frontText">—</div>
          <div class="tags" id="cardTags" style="justify-content:center"></div>
          <button class="tts-btn" id="ttsBtn" title="朗讀 (T)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
            </svg>
          </button>
        </div>
        <!-- Back face -->
        <div class="card-face back" id="backFace">
          <div class="review-back" id="backText"></div>
          <div class="review-sentence" id="sentenceText"></div>
          <div class="tags" id="cardTagsBack" style="justify-content:center"></div>
          <button class="tts-btn" id="ttsBtnBack" title="朗讀例句 (T)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-top:16px" id="showBtn">
      <button class="btn btn-primary" id="revealBtn">顯示答案 <span style="opacity:.5;font-size:.8rem;font-weight:400">空白鍵</span></button>
    </div>

    <div class="rating-btns" id="ratingBtns" style="display:none">
      <button class="rating-btn r0" data-q="0">完全不記得<span class="key-hint">[ 1 ]</span></button>
      <button class="rating-btn r1" data-q="1">很難<span class="key-hint">[ 2 ]</span></button>
      <button class="rating-btn r2" data-q="2">還行<span class="key-hint">[ 3 ]</span></button>
      <button class="rating-btn r3" data-q="3">容易<span class="key-hint">[ 4 ]</span></button>
    </div>
  </div>

  <!-- Empty state -->
  <div id="emptyArea" style="display:none">
    <div class="empty-state">
      <div class="icon">📭</div>
      <p>這個牌組還沒有單字<br>前往<a href="manage.html" style="color:var(--accent2)">管理頁面</a>新增或匯入 CSV</p>
    </div>
  </div>

  <!-- Done area -->
  <div id="doneArea" style="display:none;text-align:center;padding:40px 0">
    <div style="font-size:3rem">🎉</div>
    <h2 style="margin:16px 0 8px">今日複習完成！</h2>
    <p style="color:var(--muted)">明天再來繼續</p>
    <!-- 今日統計 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0" id="doneStats">
      <div class="stat"><div class="num" id="doneTotal">0</div><div class="label">已複習</div></div>
      <div class="stat"><div class="num" id="doneCorrect">0</div><div class="label">記得</div></div>
      <div class="stat"><div class="num" id="doneTime">0m</div><div class="label">花費時間</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-primary" id="practiceAgainBtn">再練一次</button>
      <button class="btn btn-secondary" onclick="location.href='manage.html'">管理單字</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth } from "./firebase.js";
  import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getCards, getDecks, getProgress, saveProgress } from "./db.js";
  import { sm2, isDue } from "./sm2.js";

  let uid, cards = [], allCards = [], decks = [], progress = {}, queue = [], current = null;
  let doneCount = 0, doneCards = [], correctCount = 0, sessionStart = Date.now();

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = "index.html"; return; }
    uid = user.uid;
    document.getElementById("userName").textContent = user.displayName || user.email;
    if (user.photoURL) {
      const av = document.getElementById("avatar");
      av.src = user.photoURL; av.style.display = "block";
    }
    await loadData();
  });

  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

  async function loadData() {
    decks = await getDecks(uid);
    const sel = document.getElementById("deckSelect");
    const opts = decks.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
    sel.innerHTML = opts + '<option value="">全部牌組</option>';
    if (decks.length) sel.value = decks[0].id;
    await applyDeckFilter();
  }

  async function applyDeckFilter() {
    // show skeleton
    document.getElementById("skeletonArea").style.display = "block";
    document.getElementById("reviewArea").style.display = "none";
    document.getElementById("doneArea").style.display = "none";
    document.getElementById("emptyArea").style.display = "none";

    const deckId = document.getElementById("deckSelect").value || null;
    [cards, progress] = await Promise.all([getCards(uid, deckId), getProgress(uid, deckId)]);
    allCards = cards;
    queue = cards.filter(c => isDue({ ...progress[c.id] }));
    doneCards = []; doneCount = 0; correctCount = 0; sessionStart = Date.now();

    document.getElementById("statDue").textContent = queue.length;
    document.getElementById("statTotal").textContent = cards.length;
    document.getElementById("statDone").textContent = 0;
    document.getElementById("skeletonArea").style.display = "none";

    if (cards.length === 0) {
      document.getElementById("emptyArea").style.display = "block";
      return;
    }
    document.getElementById("reviewArea").style.display = "block";
    showNext();
  }

  document.getElementById("deckSelect").addEventListener("change", applyDeckFilter);

  function showNext() {
    // reset flip
    const card = document.getElementById("reviewCard");
    card.classList.remove("flipped");

    if (!queue.length) {
      document.getElementById("reviewArea").style.display = "none";
      const elapsed = Math.round((Date.now() - sessionStart) / 60000);
      document.getElementById("doneTotal").textContent = doneCount;
      document.getElementById("doneCorrect").textContent = correctCount;
      document.getElementById("doneTime").textContent = elapsed + "m";
      document.getElementById("doneArea").style.display = "block";
      return;
    }
    current = queue.shift();
    document.getElementById("frontText").textContent = current.front;
    document.getElementById("backText").textContent = current.back || "";
    document.getElementById("sentenceText").textContent = current.sentence || "";
    const tagsHtml = (current.tags || []).map(t => `<span class="tag">${t}</span>`).join("");
    document.getElementById("cardTags").innerHTML = tagsHtml;
    document.getElementById("cardTagsBack").innerHTML = tagsHtml;
    document.getElementById("showBtn").style.display = "block";
    document.getElementById("ratingBtns").style.display = "none";
    updateProgress();
  }

  function updateProgress() {
    const total = cards.filter(c => isDue({ ...progress[c.id] })).length + doneCount;
    const pct = total > 0 ? (doneCount / total) * 100 : 0;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("statDone").textContent = doneCount;
  }

  document.getElementById("revealBtn").addEventListener("click", () => {
    document.getElementById("reviewCard").classList.add("flipped");
    document.getElementById("showBtn").style.display = "none";
    // 延遲到翻牌動畫一半後顯示評分按鈕
    setTimeout(() => {
      document.getElementById("ratingBtns").style.display = "grid";
    }, 220);
    speak(current.sentence || current.front);
  });

  document.getElementById("ttsBtn").addEventListener("click", () => speak(current.front));
  document.getElementById("ttsBtnBack").addEventListener("click", () => speak(current.sentence || current.front));

  document.querySelectorAll(".rating-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const q = parseInt(btn.dataset.q) + 2;
      if (q >= 4) correctCount++; // q=2(還行) q=3(容易) 算記得
      const prev = progress[current.id] || {};
      const next = sm2(prev, q);
      progress[current.id] = next;
      await saveProgress(uid, current.id, next);
      doneCards.push(current);
      doneCount++;
      showNext();
    });
  });

  document.getElementById("practiceAgainBtn").addEventListener("click", () => {
    const source = doneCards.length ? doneCards : cards;
    queue = [...source].sort(() => Math.random() - 0.5);
    doneCards = []; doneCount = 0; correctCount = 0; sessionStart = Date.now();
    document.getElementById("doneArea").style.display = "none";
    document.getElementById("reviewArea").style.display = "block";
    document.getElementById("statDue").textContent = queue.length;
    showNext();
  });

  // 鍵盤快捷鍵
  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
    if (e.code === "Space") {
      e.preventDefault();
      if (document.getElementById("showBtn").style.display !== "none") {
        document.getElementById("revealBtn").click();
      }
    }
    if (e.key === "t" || e.key === "T") {
      speak(current?.front || "");
    }
    if (["1","2","3","4"].includes(e.key)) {
      const btns = document.querySelectorAll(".rating-btn");
      if (document.getElementById("ratingBtns").style.display !== "none") {
        btns[parseInt(e.key) - 1]?.click();
      }
    }
  });

  function detectLang(text) {
    if (/[\u3040-\u30FF\u4E00-\u9FFF\uFF00-\uFFEF]/.test(text)) return "ja-JP";
    return "en-US";
  }

  function speak(text) {
    if (!text || !speechSynthesis) return;
    speechSynthesis.cancel();
    speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = detectLang(text);
    u.rate = 0.9;
    const btns = [document.getElementById("ttsBtn"), document.getElementById("ttsBtnBack")];
    btns.forEach(b => b?.classList.add("playing"));
    u.onend = () => { speechSynthesis.cancel(); btns.forEach(b => b?.classList.remove("playing")); };
    u.onerror = () => btns.forEach(b => b?.classList.remove("playing"));
    speechSynthesis.speak(u);
  }
</script>
</body>
</html>
